<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - thinkers shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="logo">thinkers<span>shop</span></div>
      <div class="header-actions">
        <a href="index.html" class="action-btn" style="text-decoration:none;">Continue Shopping</a>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="cart.html">Cart</a>
    </nav>
  </header>

  <main style="max-width: 900px; margin: 1rem auto; padding: 0 1rem;">
    <section class="product-section">
      <div class="section-header">
        <h2>Your Shopping Cart</h2>
        <p>Review items and proceed to checkout.</p>
      </div>

      <div id="cartItems" style="background:#fff;border-radius:10px;border:1px solid #e3e3e3;padding:1rem;"></div>
      <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
        <a id="checkoutLink" href="checkout.html" class="hero-btn" style="background:#ffd700; color:#111;">Proceed to Checkout</a>
        <a href="index.html" style="text-decoration:none;background:#111;color:#fff;padding:0.7rem 1rem;border-radius:6px;">Back to Shop</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 BBC Thinkers.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
